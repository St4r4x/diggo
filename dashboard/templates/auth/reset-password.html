<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — career-ops-fr</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js" integrity="sha384-3wY11tldQ5+yWqAvmTN4XtQvnjoTva0cV15O/O/O5NTtp0ivVopSzLOzsVXWZse9" crossorigin="anonymous"></script>
  <style>body { background: #0f0a1e; color: #e2e8f0; }</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f0a1e 0%, #1a0f30 100%);">
  <div class="w-full max-w-sm p-8 rounded-xl" style="background:#1e1535;border:1px solid #2d1f5e;">
    <h1 class="text-xl font-bold mb-6 text-center text-indigo-300">Nouveau mot de passe</h1>
    <p id="error" class="text-red-400 text-sm mb-4 hidden"></p>
    <p id="success" class="text-green-400 text-sm mb-4 hidden">Mot de passe mis à jour ! Redirection...</p>
    <form id="reset-form" class="flex flex-col gap-4">
      <input id="password" type="password" placeholder="Nouveau mot de passe (min. 6 caractères)" required minlength="6"
        class="px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 text-sm focus:outline-none focus:border-indigo-400" />
      <input id="confirm" type="password" placeholder="Confirmer" required
        class="px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 text-sm focus:outline-none focus:border-indigo-400" />
      <button type="submit"
        class="py-2 rounded-lg text-sm font-semibold text-white transition-opacity hover:opacity-90"
        style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        Mettre à jour
      </button>
    </form>
  </div>
  <script>
    const supabase = window.supabase.createClient('{{ supabase_url }}', '{{ supabase_anon_key }}');

    // Supabase puts the recovery token in the URL fragment after the email link click
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Session is now set — form submission will use it
      }
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errEl = document.getElementById('error');
      const okEl = document.getElementById('success');
      errEl.classList.add('hidden');

      if (password !== confirm) {
        errEl.textContent = 'Les mots de passe ne correspondent pas.';
        errEl.classList.remove('hidden');
        return;
      }

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
        return;
      }
      okEl.classList.remove('hidden');
      setTimeout(() => window.location.href = '/login', 1500);
    });
  </script>
</body>
</html>
