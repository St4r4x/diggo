<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — Diggo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js"></script>
  <style>body { background: #0f0a1e; color: #e2e8f0; }</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f0a1e 0%, #1a0f30 100%);">
  <div class="w-full max-w-sm p-8 rounded-xl" style="background:#1e1535;border:1px solid #2d1f5e;">
    <h1 class="text-xl font-bold mb-6 text-center" style="background:linear-gradient(135deg,#a5b4fc,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Diggo</h1>
    <p id="error" class="text-red-400 text-sm mb-4 hidden"></p>
    <form id="signup-form" class="flex flex-col gap-4">
      <input id="email" name="email" type="email" placeholder="Email" required autocomplete="email"
        class="px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 text-sm focus:outline-none focus:border-indigo-400" />
      <input id="password" name="password" type="password" placeholder="Mot de passe (min. 6 caractères)" required minlength="6" autocomplete="new-password"
        class="px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 text-sm focus:outline-none focus:border-indigo-400" />
      <input id="confirm" name="confirm" type="password" placeholder="Confirmer le mot de passe" required autocomplete="new-password"
        class="px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 text-sm focus:outline-none focus:border-indigo-400" />
      <button type="submit"
        class="py-2 rounded-lg text-sm font-semibold text-white transition-opacity hover:opacity-90"
        style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        Créer mon compte
      </button>
    </form>
    <p class="text-sm text-slate-400 mt-4 text-center">
      Déjà un compte ? <a href="/login" class="text-indigo-400 hover:text-indigo-300">Se connecter</a>
    </p>
  </div>
  <script>
    const errEl = document.getElementById('error');
    const btn = document.querySelector('button[type=submit]');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
      if (btn) btn.disabled = false;
    }

    function setLoading(on) {
      if (!btn) return;
      btn.disabled = on;
      btn.textContent = on ? 'Chargement…' : 'Créer mon compte';
    }

    let client;
    try {
      if (!window.supabase) throw new Error('supabase-js non chargé (vérifier la connexion internet)');
      client = window.supabase.createClient('{{ supabase_url }}', '{{ supabase_anon_key }}');
    } catch (err) {
      showErr('Erreur init: ' + err.message);
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');

      if (!client) { showErr('Client Supabase non initialisé — rechargez la page.'); return; }

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) { showErr('Les mots de passe ne correspondent pas.'); return; }
      if (password.length < 6) { showErr('Le mot de passe doit faire au moins 6 caractères.'); return; }

      setLoading(true);
      try {
        const { data, error } = await client.auth.signUp({ email, password });
        if (error) { showErr('Erreur Supabase: ' + error.message + ' (status ' + (error.status ?? '?') + ')'); return; }
        if (!data?.user) { showErr('Inscription échouée: aucun utilisateur retourné.'); return; }
        window.location.href = '/auth/confirm';
      } catch (err) {
        showErr('Erreur réseau: ' + err.message);
      }
    });
  </script>
</body>
</html>
