<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diggo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #0f0a1e; color: #e2e8f0; }
    .scrollable { overflow-y: auto; }
    /* Gradient accent utility */
    .bg-accent { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .bg-accent-rose { background: linear-gradient(135deg, #6366f1, #ec4899); }
    .text-accent { color: #a5b4fc; }
    /* Grade badge colors */
    .grade-a { background: linear-gradient(135deg, #6366f1, #ec4899); color: #fff; }
    .grade-b { background: linear-gradient(135deg, #1d4ed8, #6366f1); color: #fff; }
    .grade-c { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; }
    .grade-d { background: linear-gradient(135deg, #b45309, #d97706); color: #fff; }
    .grade-f { background: #374151; color: #9ca3af; }
    .prose-report h1,.prose-report h2,.prose-report h3 { color:#f1f5f9; font-weight:600; margin-top:1rem; margin-bottom:0.5rem; }
    .prose-report h1 { font-size:1.1rem; }
    .prose-report h2 { font-size:1rem; }
    .prose-report h3 { font-size:0.9rem; }
    .prose-report strong { color:#e2e8f0; }
    .prose-report a { color:#a5b4fc; text-decoration:underline; }
    .prose-report hr { border-color:#2d1f5e; margin:0.75rem 0; }
    .prose-report ul { list-style:disc; padding-left:1.25rem; }
  </style>
</head>
<body class="h-screen flex flex-col" style="background: linear-gradient(135deg, #0f0a1e 0%, #1a0f30 100%);">
  <nav style="background:#1e1535;border-bottom:1px solid #2d1f5e;" class="px-5 py-3 flex items-center gap-6 shrink-0">
    <span class="font-bold text-lg" style="background:linear-gradient(135deg,#a5b4fc,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Diggo</span>
    <a href="/candidatures" class="{{ 'text-indigo-400 font-semibold border-b border-indigo-400 pb-0.5' if request.url.path == '/candidatures' else 'text-slate-400 hover:text-slate-200' }} text-sm transition-colors">Candidatures</a>
    <a href="/stats" class="{{ 'text-indigo-400 font-semibold border-b border-indigo-400 pb-0.5' if request.url.path == '/stats' else 'text-slate-400 hover:text-slate-200' }} text-sm transition-colors">Stats</a>
    <a href="/profile" class="{{ 'text-indigo-400 font-semibold border-b border-indigo-400 pb-0.5' if request.url.path == '/profile' else 'text-slate-400 hover:text-slate-200' }} text-sm transition-colors">Profil</a>
    <a href="/settings" class="{{ 'text-indigo-400 font-semibold border-b border-indigo-400 pb-0.5' if request.url.path == '/settings' else 'text-slate-400 hover:text-slate-200' }} text-sm transition-colors">Paramètres</a>
    <div class="ml-auto flex items-center gap-3">
      {% if current_user is defined %}
        <span class="text-xs text-slate-400">{{ current_user.email }}</span>
        <button
          onclick="logout()"
          class="text-xs px-3 py-1 rounded-md text-slate-300 hover:text-white transition-colors"
          style="background:#2d1f5e;">
          Déconnexion
        </button>
      {% endif %}
    </div>
  </nav>
  <script>
    async function logout() {
      await fetch('/api/auth/session', { method: 'DELETE' });
      window.location.href = '/login';
    }
  </script>
  <main class="flex-1 overflow-hidden">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
