<div id="offer-notes-{{ offer.id }}" class="flex flex-col h-full">
  <div class="flex items-center justify-between mb-1.5 shrink-0">
    <p style="color:#8b5cf6;" class="text-sm font-medium">Notes</p>
    {% if saved %}
    <span class="text-xs" style="color:#4ade80;" id="notes-saved-{{ offer.id }}">✓ Sauvegardé</span>
    <script>
      setTimeout(function() {
        var el = document.getElementById("notes-saved-{{ offer.id }}");
        if (el) el.style.display = "none";
      }, 2000);
    </script>
    {% endif %}
  </div>
  <textarea
    name="notes"
    placeholder="Questions à poser, points clés, impressions, contacts…"
    class="w-full flex-1 text-sm rounded-lg p-3 resize-none focus:outline-none transition-colors placeholder-slate-500"
    style="background:#1e1535;border:1px solid #2d1f5e;color:#e2e8f0;min-height:8rem;"
    onfocus="this.style.borderColor='#6366f1'"
    onblur="this.style.borderColor='#2d1f5e'"
    hx-post="/offers/{{ offer.id }}/notes"
    hx-trigger="keyup changed delay:800ms"
    hx-target="#offer-notes-{{ offer.id }}"
    hx-swap="outerHTML"
    hx-include="this"
  >{{ offer.notes or "" }}</textarea>
</div>
