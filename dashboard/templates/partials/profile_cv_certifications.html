{% if saved %}<p class="pf-flash mb-2">✓ Sauvegardé</p>{% endif %}
{% if error %}<p class="text-red-400 text-xs mb-2">{{ error }}</p>{% endif %}
<form hx-post="/profile/cv/certifications" hx-target="#section-cv-certifications" hx-swap="innerHTML"
      onsubmit="syncCertsData()">
  <input type="hidden" name="data" id="certs-data" value="">
  <div class="space-y-2 mb-3">
    {% for cert in cv.certifications %}
    <div class="grid grid-cols-3 gap-2">
      <input class="pf-input" data-cert="{{ loop.index0 }}" data-field="name"
             value="{{ cert.name }}" placeholder="Certification">
      <input class="pf-input" data-cert="{{ loop.index0 }}" data-field="issuer"
             value="{{ cert.issuer }}" placeholder="Émetteur">
      <input class="pf-input" data-cert="{{ loop.index0 }}" data-field="year" type="number"
             value="{{ cert.year or '' }}" placeholder="Année">
    </div>
    {% else %}
    <p class="pf-label">Aucune certification.</p>
    {% endfor %}
  </div>
  <div class="flex justify-end">
    <button type="submit" class="pf-save-btn">Sauvegarder</button>
  </div>
</form>
<script>
(function() {
  var _certs = {{ cv.certifications | tojson }};
  function syncCertsData() {
    var form = document.getElementById('certs-data').closest('form');
    form.querySelectorAll('[data-cert]').forEach(function(el) {
      var i = parseInt(el.dataset.cert);
      var field = el.dataset.field;
      _certs[i][field] = field === 'year' ? (parseInt(el.value) || null) : el.value;
    });
    document.getElementById('certs-data').value = JSON.stringify(_certs);
  }
  window.syncCertsData = syncCertsData;
})();
</script>
