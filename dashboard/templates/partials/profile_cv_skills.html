{% if saved %}<p class="pf-flash mb-2">✓ Sauvegardé</p>{% endif %}
{% if error %}<p class="text-red-400 text-xs mb-2">{{ error }}</p>{% endif %}
<form hx-post="/profile/cv/skills" hx-target="#section-cv-skills-{{ lang }}" hx-swap="innerHTML"
      onsubmit="syncSkillsData('{{ lang }}')">
  <input type="hidden" name="lang" value="{{ lang }}">
  <input type="hidden" name="data" id="skills-data-{{ lang }}" value="">
  <div class="space-y-2 mb-3">
    {% set categories = cv.skills | map(attribute='category') | unique | list %}
    {% for cat in categories %}
    <div class="flex gap-2 items-center">
      <label class="pf-label w-28 shrink-0">{{ cat }}</label>
      <input class="pf-input"
             data-cat="{{ cat }}"
             value="{{ cv.skills | selectattr('category', 'equalto', cat) | map(attribute='skill') | join(', ') }}"
             placeholder="skill1, skill2, …">
    </div>
    {% else %}
    <p class="pf-label">Aucune compétence.</p>
    {% endfor %}
  </div>
  <div class="flex justify-end">
    <button type="submit" class="pf-save-btn">Sauvegarder</button>
  </div>
</form>
<script>
(function() {
  function syncSkillsData(lang) {
    var form = document.getElementById('skills-data-' + lang).closest('form');
    var result = [];
    form.querySelectorAll('[data-cat]').forEach(function(el) {
      var cat = el.dataset.cat;
      el.value.split(',').map(function(s){ return s.trim(); }).filter(Boolean).forEach(function(skill, i) {
        result.push({category: cat, skill: skill, sort_order: i});
      });
    });
    document.getElementById('skills-data-' + lang).value = JSON.stringify(result);
  }
  window.syncSkillsData = syncSkillsData;
})();
</script>
