{% if ats_targets %}
<table class="w-full text-sm">
  <thead>
    <tr class="text-gray-400 text-left">
      <th class="pb-2 pr-4">Entreprise</th>
      <th class="pb-2 pr-4">URL Careers</th>
      <th class="pb-2"></th>
    </tr>
  </thead>
  <tbody>
    {% for t in ats_targets %}
    <tr class="border-t border-gray-700">
      <td class="py-2 pr-4 text-white">{{ t.name }}</td>
      <td class="py-2 pr-4 text-gray-300 font-mono text-xs">{{ t.careers_url }}</td>
      <td class="py-2">
        <button hx-delete="/settings/ats/{{ t.id }}"
                hx-target="#ats-list"
                hx-swap="innerHTML"
                hx-confirm="Supprimer {{ t.name }} ?"
                class="text-red-400 hover:text-red-300 text-xs">
          Supprimer
        </button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-gray-500 text-sm">Aucune cible ATS configurée.</p>
{% endif %}
