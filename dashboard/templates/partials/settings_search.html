<form hx-post="/settings/search" hx-target="this" hx-swap="outerHTML" class="space-y-4">
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1">Keywords (un par ligne)</label>
      <textarea name="keywords" rows="4"
                class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm font-mono"
      >{{ settings.keywords | join('\n') }}</textarea>
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Portal queries (un par ligne)</label>
      <textarea name="portal_queries" rows="4"
                class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm font-mono"
      >{{ settings.portal_queries | join('\n') }}</textarea>
    </div>
  </div>
  <div class="grid grid-cols-3 gap-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1">Localisation</label>
      <input name="location" value="{{ settings.location }}"
             class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Contrat</label>
      <input name="contract" value="{{ settings.contract }}"
             class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Exp. max (ans)</label>
      <input name="experience_max_years" type="number" value="{{ settings.experience_max_years }}"
             class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm">
    </div>
  </div>
  <div class="grid grid-cols-3 gap-4">
    <div>
      <label class="block text-sm text-gray-400 mb-1">Salaire min (€)</label>
      <input name="salary_min" type="number" value="{{ settings.salary_min }}"
             class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Salaire max (€)</label>
      <input name="salary_max" type="number" value="{{ settings.salary_max }}"
             class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Relance après (jours)</label>
      <input name="follow_up_days" type="number" value="{{ settings.follow_up_days }}"
             class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm">
    </div>
  </div>
  <div>
    <label class="block text-sm text-gray-400 mb-1">Entreprises cibles (une par ligne)</label>
    <textarea name="target_companies" rows="3"
              class="w-full bg-gray-700 text-white rounded px-3 py-2 text-sm font-mono"
    >{{ settings.target_companies | join('\n') }}</textarea>
  </div>
  <div class="flex items-center gap-3">
    <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">
      Enregistrer
    </button>
    {% if saved %}<span class="text-green-400 text-sm">Sauvegardé</span>{% endif %}
  </div>
</form>
