{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto py-8 px-4 space-y-8">
  <h1 class="text-2xl font-bold text-white">Paramètres</h1>

  <div class="bg-gray-800 rounded-xl p-6">
    <h2 class="text-lg font-semibold text-white mb-4">Recherche</h2>
    {% include "partials/settings_search.html" %}
  </div>

  <div class="bg-gray-800 rounded-xl p-6">
    <h2 class="text-lg font-semibold text-white mb-4">Clé API Hugging Face</h2>
    <div id="hf-token-section">
      {% include "partials/settings_hf_token.html" %}
    </div>
  </div>

  <div class="bg-gray-800 rounded-xl p-6">
    <h2 class="text-lg font-semibold text-white mb-4">ATS Targets</h2>
    <div id="ats-list">
      {% include "partials/settings_ats.html" %}
    </div>
    <form hx-post="/settings/ats" hx-target="#ats-list" hx-swap="innerHTML" class="flex gap-2 mt-4">
      <input name="name" placeholder="Nom de l'entreprise" required
             class="flex-1 bg-gray-700 text-white rounded px-3 py-2 text-sm">
      <input name="careers_url" placeholder="https://jobs.lever.co/..." required
             class="flex-1 bg-gray-700 text-white rounded px-3 py-2 text-sm">
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">
        Ajouter
      </button>
    </form>
  </div>
</div>
{% endblock %}
