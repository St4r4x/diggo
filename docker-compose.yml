name: diggo

services:
  api:
    build: .
    command: ["dashboard"]
    volumes:
      - ./reports:/app/reports
      - ./output:/app/output
      - ./config:/app/config:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_PUBLIC_URL=http://localhost:54321
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    environment:
      # ponytail: Next.js standalone server.js binds to $HOSTNAME, which Docker
      # auto-sets to the container ID; force it so the server listens on all
      # interfaces and the healthcheck can reach it via localhost.
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://api:8000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pipeline:
    build: .
    command: ["pipeline"]
    volumes:
      - ./reports:/app/reports
      - ./output:/app/output
      - ./config:/app/config:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
    profiles:
      - manual
